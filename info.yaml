# Tiny Tapeout project information
project:
  title:        "DSP_FIR"      # Project title
  author:       "LIM ZING"      # Your name
  discord:      "zzzzzing"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Digital Signal Processor using Finite Impulse Response (FIR) Filter"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_seapanda0"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "dsp_fir.v"
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "d0_in"
  ui[1]: "d1_in"
  ui[2]: "d2_in"
  ui[3]: "d3_in"
  ui[4]: "d4_in"
  ui[5]: "d5_in"
  ui[6]: "d6_in"
  ui[7]: "d7_in"

  # Outputs
  uo[0]: "d0_out"
  uo[1]: "d1_out"
  uo[2]: "d2_out"
  uo[3]: "d3_out"
  uo[4]: "d4_out"
  uo[5]: "d5_out"
  uo[6]: "d6_out"
  uo[7]: "d7_out"

  # Bidirectional pins
  uio[0]: "adc_clk (output)"
  uio[1]: "dac_clk (output)"
  uio[2]: "mode (input)"
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
